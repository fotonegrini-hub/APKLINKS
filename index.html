<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Gerenciador de Atalhos · Abas com Links (URLs ocultas)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Inter', 'Roboto', sans-serif;
        }

        body {
            background: #f1f5f9;
            padding: 20px;
            min-height: 100vh;
        }

        /* APP CONTAINER */
        .app {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            transition: all 0.2s;
        }

        /* CABEÇALHO GLOBAL + BUSCA GLOBAL */
        .global-header {
            background: #0f172a;
            color: white;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #1e293b;
        }

        .global-header h1 {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .global-header h1 small {
            font-size: 0.75rem;
            background: #334155;
            padding: 2px 10px;
            border-radius: 40px;
            font-weight: normal;
        }

        .global-search-area {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .global-search-area input {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 10px 14px;
            border-radius: 60px;
            color: white;
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
        }

        .global-search-area input:focus {
            border-color: #3b82f6;
            background: #0f172a;
        }

        .global-results {
            background: #1e293b;
            border-radius: 18px;
            padding: 8px 12px;
            max-height: 180px;
            overflow-y: auto;
            font-size: 0.85rem;
            display: none;
        }

        .global-results.show {
            display: block;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 8px;
            border-bottom: 1px solid #334155;
            cursor: pointer;
            transition: 0.1s;
        }

        .result-item:hover {
            background: #334155;
            border-radius: 12px;
        }

        .result-info strong {
            color: #facc15;
        }

        .result-info span {
            color: #cbd5e1;
            font-size: 0.75rem;
        }

        .result-action {
            background: #3b82f6;
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        /* ABAS SUPERIOR */
        .tabs-bar {
            background: #f8fafc;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 4px;
            padding: 12px 20px 0 20px;
            border-bottom: 1px solid #e2e8f0;
        }

        .tab-btn {
            background: #eef2ff;
            border: none;
            padding: 8px 20px;
            border-radius: 30px 30px 12px 12px;
            font-weight: 500;
            font-size: 0.85rem;
            color: #1e293b;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            border-bottom: 2px solid transparent;
        }

        .tab-btn.active {
            background: white;
            color: #2563eb;
            border-bottom: 2px solid #2563eb;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.02);
        }

        .tab-btn:hover:not(.active) {
            background: #e2e8f0;
        }

        .add-tab-btn {
            background: #d9f99d;
            color: #3f6212;
            margin-left: 8px;
            font-weight: bold;
        }

        /* CONTEÚDO DA ABA */
        .tab-content-pane {
            padding: 24px 28px;
            background: #ffffff;
            transition: 0.1s;
        }

        /* CABEÇALHO DA ABA (controles) */
        .tab-header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 12px;
            border-bottom: 2px solid #eef2ff;
        }

        .tab-title-area {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f1f5f9;
            padding: 4px 15px 4px 20px;
            border-radius: 60px;
        }

        .tab-title-area h2 {
            font-size: 1.35rem;
            font-weight: 600;
            color: #0f172a;
        }

        .edit-name-btn, .delete-tab-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 6px;
            border-radius: 40px;
            transition: 0.1s;
        }

        .edit-name-btn:hover {
            background: #e2e8f0;
        }

        .delete-tab-btn {
            color: #dc2626;
        }

        .delete-tab-btn:hover {
            background: #fee2e2;
        }

        /* LISTA DE ATALHOS (agora sem mostrar URL) */
        .shortcuts-section {
            width: 100%;
        }

        .filter-shortcuts {
            margin-bottom: 20px;
        }
        .filter-shortcuts input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            font-size: 0.85rem;
            outline: none;
        }

        .shortcuts-list {
            list-style: none;
            margin: 20px 0;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 5px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 10px;
        }

        .shortcut-item {
            background: #f8fafc;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px 8px 20px;
            transition: 0.1s;
            border: 1px solid #eef2ff;
        }

        .shortcut-item:hover {
            background: #eef2ff;
            transform: scale(0.99);
        }

        .shortcut-link {
            flex: 1;
            cursor: pointer;
            font-weight: 500;
            color: #1e40af;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            overflow: hidden;
        }

        /* apenas o nome visível, sem qualquer indicação de URL */
        .shortcut-link strong {
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        /* nenhum span com URL é mostrado */

        .item-actions {
            display: flex;
            gap: 6px;
        }

        .item-actions button {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            padding: 5px 8px;
            border-radius: 30px;
        }

        .edit-shortcut {
            color: #f59e0b;
        }
        .delete-shortcut {
            color: #dc2626;
        }
        .open-newtab {
            color: #3b82f6;
        }

        /* FORM ADICIONAR ATALHO */
        .add-shortcut-form {
            margin-top: 24px;
            background: #f1f5f9;
            padding: 18px;
            border-radius: 28px;
        }
        .add-shortcut-form h4 {
            font-size: 0.9rem;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .form-row input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 60px;
            border: 1px solid #cbd5e1;
            background: white;
        }
        .form-row button {
            background: #0f172a;
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
        }

        .empty-msg {
            text-align: center;
            color: #94a3b8;
            padding: 40px;
            background: #f8fafc;
            border-radius: 40px;
            grid-column: 1 / -1;
        }

        button {
            transition: all 0.1s ease;
        }
        button:active {
            transform: scale(0.96);
        }

        @media (max-width: 750px) {
            .tab-content-pane {
                padding: 16px;
            }
            .shortcuts-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="global-header">
        <h1>📌 Meus Atalhos <small>clique → abre em nova aba (URL oculta)</small></h1>
        <div class="global-search-area">
            <input type="text" id="globalSearchInput" placeholder="🔍 Buscar em TODOS os atalhos (por nome ou url) ..." autocomplete="off">
            <div id="globalResults" class="global-results"></div>
        </div>
    </div>

    <div class="tabs-bar" id="tabsBar"></div>

    <div id="tabContentContainer" class="tab-content-pane"></div>
</div>

<script>
    // ---------- ESTRUTURA DE DADOS ----------
    let abas = [];          // cada aba: { id, nome, shortcuts: [{ id, nome, url }] }
    let activeTabId = null;
    let tabFilters = {};    // guarda texto de filtro por id da aba

    // IDs
    function gerarId() {
        return Date.now() + '-' + Math.random().toString(36).substr(2, 6);
    }

    // Carregar / salvar localStorage (sem iframe)
    function salvarDados() {
        const dados = {
            abas: abas.map(aba => ({
                id: aba.id,
                nome: aba.nome,
                shortcuts: aba.shortcuts.map(s => ({ id: s.id, nome: s.nome, url: s.url }))
            })),
            activeTabId: activeTabId,
            tabFilters: tabFilters
        };
        localStorage.setItem('app_abas_atalhos_oculto', JSON.stringify(dados));
    }

    function carregarDados() {
        const raw = localStorage.getItem('app_abas_atalhos_oculto');
        if (!raw) {
            // Dados iniciais: Principal + exemplo Trabalho
            const abaPrincipal = {
                id: gerarId(),
                nome: '🌟 Principal',
                shortcuts: [
                    { id: gerarId(), nome: 'Google', url: 'https://www.google.com' },
                    { id: gerarId(), nome: 'YouTube', url: 'https://www.youtube.com' },
                    { id: gerarId(), nome: 'GitHub', url: 'https://github.com' },
                    { id: gerarId(), nome: 'Cliente Exemplo', url: 'https://www.wikipedia.org' }
                ]
            };
            const abaExemplo = {
                id: gerarId(),
                nome: '📁 Trabalho',
                shortcuts: [
                    { id: gerarId(), nome: 'Drive', url: 'https://drive.google.com' },
                    { id: gerarId(), nome: 'Trello', url: 'https://trello.com' }
                ]
            };
            abas = [abaPrincipal, abaExemplo];
            activeTabId = abaPrincipal.id;
            tabFilters = {};
            return;
        }
        try {
            const dados = JSON.parse(raw);
            abas = dados.abas;
            activeTabId = dados.activeTabId || (abas[0]?.id || null);
            tabFilters = dados.tabFilters || {};
        } catch(e) { console.warn(e); }
    }

    // ---------- HELPERS ----------
    function normalizarUrl(url) {
        let trimmed = url.trim();
        if (!trimmed) return null;
        if (!/^https?:\/\//i.test(trimmed)) {
            return 'https://' + trimmed;
        }
        return trimmed;
    }

    function adicionarAtalho(abaId, nome, urlRaw) {
        const aba = abas.find(a => a.id === abaId);
        if (!aba) return false;
        const url = normalizarUrl(urlRaw);
        if (!nome.trim() || !url) return false;
        aba.shortcuts.push({
            id: gerarId(),
            nome: nome.trim(),
            url: url
        });
        salvarDados();
        renderizarInterface();
        return true;
    }

    function removerAtalho(abaId, shortcutId) {
        const aba = abas.find(a => a.id === abaId);
        if (!aba) return;
        aba.shortcuts = aba.shortcuts.filter(s => s.id !== shortcutId);
        salvarDados();
        renderizarInterface();
    }

    function editarAtalho(abaId, shortcutId, novoNome, novaUrl) {
        const aba = abas.find(a => a.id === abaId);
        if (!aba) return;
        const atalho = aba.shortcuts.find(s => s.id === shortcutId);
        if (atalho) {
            if (novoNome.trim()) atalho.nome = novoNome.trim();
            const urlOk = normalizarUrl(novaUrl);
            if (urlOk) atalho.url = urlOk;
        }
        salvarDados();
        renderizarInterface();
    }

    function renomearAba(abaId, novoNome) {
        const aba = abas.find(a => a.id === abaId);
        if (aba && novoNome.trim()) {
            aba.nome = novoNome.trim();
            salvarDados();
            renderizarInterface();
        }
    }

    function deletarAba(abaId) {
        if (abas.length === 1) {
            alert("Você precisa manter pelo menos uma aba principal!");
            return;
        }
        const index = abas.findIndex(a => a.id === abaId);
        if (index !== -1) {
            abas.splice(index, 1);
            if (activeTabId === abaId) {
                activeTabId = abas[0]?.id || null;
            }
            delete tabFilters[abaId];
            salvarDados();
            renderizarInterface();
        }
    }

    function adicionarNovaAba() {
        const novaAba = {
            id: gerarId(),
            nome: `📄 Aba ${abas.length + 1}`,
            shortcuts: []
        };
        abas.push(novaAba);
        activeTabId = novaAba.id;
        salvarDados();
        renderizarInterface();
    }

    // ---------- RENDER PRINCIPAL ----------
    function renderizarAbasHeader() {
        const container = document.getElementById('tabsBar');
        if (!container) return;
        container.innerHTML = '';
        abas.forEach(aba => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${activeTabId === aba.id ? 'active' : ''}`;
            btn.innerHTML = `${aba.nome} <span style="font-size:0.7rem;">📌</span>`;
            btn.onclick = (e) => {
                e.preventDefault();
                activeTabId = aba.id;
                salvarDados();
                renderizarInterface();
            };
            container.appendChild(btn);
        });
        const addBtn = document.createElement('button');
        addBtn.className = 'tab-btn add-tab-btn';
        addBtn.innerHTML = '+ Nova Aba';
        addBtn.onclick = () => adicionarNovaAba();
        container.appendChild(addBtn);
    }

    // Renderiza o conteúdo da aba ativa (somente atalhos com nome visível, URL oculta)
    function renderizarAbaAtivaConteudo() {
        const aba = abas.find(a => a.id === activeTabId);
        if (!aba) return;

        const container = document.getElementById('tabContentContainer');
        if (!container) return;

        const filtroAtual = tabFilters[activeTabId] || '';
        let atalhosFiltrados = [...aba.shortcuts];
        if (filtroAtual.trim() !== '') {
            const term = filtroAtual.trim().toLowerCase();
            atalhosFiltrados = atalhosFiltrados.filter(s =>
                s.nome.toLowerCase().includes(term) || s.url.toLowerCase().includes(term)
            );
        }

        const html = `
            <div class="tab-header-actions">
                <div class="tab-title-area">
                    <h2 id="tabNameDisplay">${escapeHtml(aba.nome)}</h2>
                    <button class="edit-name-btn" id="renameTabBtn" title="Renomear aba">✏️</button>
                    <button class="delete-tab-btn" id="deleteTabBtn" title="Remover aba">🗑️</button>
                </div>
                <div style="font-size:12px; color:#475569;">✨ Clique em qualquer atalho → abre em nova aba (URL escondida)</div>
            </div>

            <div class="shortcuts-section">
                <div class="filter-shortcuts">
                    <input type="text" id="filterShortcutsInput" placeholder="🔎 Filtrar atalhos desta aba (por nome ou URL oculta)" value="${escapeHtml(filtroAtual)}">
                </div>
                <ul class="shortcuts-list" id="shortcutsList">
                    ${atalhosFiltrados.length === 0 ? '<div class="empty-msg">📭 Nenhum atalho encontrado. Adicione abaixo.</div>' : 
                        atalhosFiltrados.map(s => `
                            <li class="shortcut-item" data-shortcut-id="${s.id}">
                                <div class="shortcut-link" data-url="${escapeHtml(s.url)}" data-nome="${escapeHtml(s.nome)}">
                                    <strong>🔗 ${escapeHtml(s.nome)}</strong>
                                    <!-- URL completamente oculta, não exibida -->
                                </div>
                                <div class="item-actions">
                                    <button class="open-newtab" title="Abrir em nova guia">📎</button>
                                    <button class="edit-shortcut" title="Editar">✏️</button>
                                    <button class="delete-shortcut" title="Remover">❌</button>
                                </div>
                            </li>
                        `).join('')
                    }
                </ul>
                <div class="add-shortcut-form">
                    <h4>➕ Adicionar novo atalho a esta aba</h4>
                    <div class="form-row">
                        <input type="text" id="newShortcutNome" placeholder="Nome do atalho (ex: Cliente XPTO)">
                        <input type="text" id="newShortcutUrl" placeholder="https://... ou site.com">
                        <button id="addShortcutBtn">Salvar</button>
                    </div>
                </div>
            </div>
        `;
        container.innerHTML = html;

        // Eventos da aba
        document.getElementById('renameTabBtn')?.addEventListener('click', () => {
            const novoNome = prompt('Novo nome para a aba:', aba.nome);
            if (novoNome && novoNome.trim()) renomearAba(aba.id, novoNome.trim());
        });
        document.getElementById('deleteTabBtn')?.addEventListener('click', () => {
            if (confirm(`Remover a aba "${aba.nome}" e todos os atalhos?`)) deletarAba(aba.id);
        });

        const filterInput = document.getElementById('filterShortcutsInput');
        if (filterInput) {
            filterInput.addEventListener('input', (e) => {
                tabFilters[activeTabId] = e.target.value;
                salvarDados();
                renderizarAbaAtivaConteudo();
            });
        }

        const addBtn = document.getElementById('addShortcutBtn');
        const nomeInp = document.getElementById('newShortcutNome');
        const urlInp = document.getElementById('newShortcutUrl');
        addBtn?.addEventListener('click', () => {
            const nomeVal = nomeInp.value.trim();
            const urlVal = urlInp.value.trim();
            if (!nomeVal || !urlVal) {
                alert('Preencha nome e URL do atalho');
                return;
            }
            adicionarAtalho(aba.id, nomeVal, urlVal);
            nomeInp.value = '';
            urlInp.value = '';
        });

        // Eventos para os atalhos (abrir em nova aba)
        const lista = document.getElementById('shortcutsList');
        if (lista) {
            lista.querySelectorAll('.shortcut-item').forEach(item => {
                const shortcutId = item.dataset.shortcutId;
                const atalho = aba.shortcuts.find(s => s.id === shortcutId);
                if (!atalho) return;

                // Clique no link (área do nome) abre em nova aba
                const linkDiv = item.querySelector('.shortcut-link');
                linkDiv?.addEventListener('click', (e) => {
                    e.stopPropagation();
                    window.open(atalho.url, '_blank');
                });

                // Botão específico "abrir em nova guia"
                const newTabBtn = item.querySelector('.open-newtab');
                newTabBtn?.addEventListener('click', (e) => {
                    e.stopPropagation();
                    window.open(atalho.url, '_blank');
                });

                // Editar atalho
                const editBtn = item.querySelector('.edit-shortcut');
                editBtn?.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const novoNome = prompt('Editar nome:', atalho.nome);
                    const novaUrl = prompt('Editar URL:', atalho.url);
                    if (novoNome || novaUrl) {
                        editarAtalho(aba.id, atalho.id, novoNome || atalho.nome, novaUrl || atalho.url);
                    }
                });

                // Deletar atalho
                const delBtn = item.querySelector('.delete-shortcut');
                delBtn?.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (confirm(`Remover atalho "${atalho.nome}"?`)) removerAtalho(aba.id, atalho.id);
                });
            });
        }
    }

    // Busca Global (pesquisa em todos atalhos)
    function renderBuscaGlobal(termo) {
        const resultsDiv = document.getElementById('globalResults');
        if (!termo.trim()) {
            resultsDiv.classList.remove('show');
            resultsDiv.innerHTML = '';
            return;
        }
        const termLower = termo.trim().toLowerCase();
        const resultados = [];
        for (const aba of abas) {
            for (const atalho of aba.shortcuts) {
                if (atalho.nome.toLowerCase().includes(termLower) || atalho.url.toLowerCase().includes(termLower)) {
                    resultados.push({ abaId: aba.id, abaNome: aba.nome, atalho });
                }
            }
        }
        if (resultados.length === 0) {
            resultsDiv.innerHTML = '<div style="padding: 10px; color: #94a3b8;">Nenhum atalho encontrado 😕</div>';
            resultsDiv.classList.add('show');
            return;
        }
        resultsDiv.innerHTML = resultados.map(res => `
            <div class="result-item" data-url="${escapeHtml(res.atalho.url)}" data-shortcut-name="${escapeHtml(res.atalho.nome)}">
                <div class="result-info">
                    <strong>${escapeHtml(res.atalho.nome)}</strong> 
                    <span>📁 ${escapeHtml(res.abaNome)}</span><br>
                    <!-- URL oculta nos resultados também não é mostrada ao usuário -->
                </div>
                <div class="result-action">Abrir →</div>
            </div>
        `).join('');
        resultsDiv.classList.add('show');

        document.querySelectorAll('.result-item').forEach(el => {
            el.addEventListener('click', (e) => {
                const url = el.dataset.url;
                if (url) {
                    window.open(url, '_blank');
                    // feedback rápido
                    const msgDiv = document.createElement('div');
                    msgDiv.textContent = `🔗 Abrindo: ${el.dataset.shortcutName || 'link'} em nova aba`;
                    msgDiv.style.position = 'fixed'; msgDiv.style.bottom = '20px'; msgDiv.style.right = '20px';
                    msgDiv.style.backgroundColor = '#0f172a'; msgDiv.style.color = 'white'; msgDiv.style.padding = '8px 16px'; msgDiv.style.borderRadius = '40px'; msgDiv.style.zIndex = '999';
                    document.body.appendChild(msgDiv);
                    setTimeout(() => msgDiv.remove(), 1500);
                }
            });
        });
    }

    function renderizarInterface() {
        renderizarAbasHeader();
        if (activeTabId && abas.find(a => a.id === activeTabId)) {
            renderizarAbaAtivaConteudo();
        } else if (abas.length > 0) {
            activeTabId = abas[0].id;
            renderizarAbaAtivaConteudo();
        } else {
            document.getElementById('tabContentContainer').innerHTML = '<div style="padding: 40px;">Clique em "+ Nova Aba" para começar.</div>';
        }

        const searchGlobal = document.getElementById('globalSearchInput');
        if (searchGlobal) {
            const currentVal = searchGlobal.value;
            const newHandler = () => renderBuscaGlobal(searchGlobal.value);
            searchGlobal.removeEventListener('input', newHandler);
            searchGlobal.addEventListener('input', newHandler);
            if (currentVal) renderBuscaGlobal(currentVal);
            else renderBuscaGlobal('');
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Inicialização
    carregarDados();
    renderizarInterface();
    window.addEventListener('beforeunload', () => salvarDados());
</script>
</body>
